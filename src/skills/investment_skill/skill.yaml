name: investment-skill
description: "投资助手主调度器Skill。分析用户意图，将投资相关请求路由到专业技能（想法记录/投资问答/记忆检索/提醒设置/大师思想）。当用户表达任何投资相关想法或问题时激活。"
version: "0.1.0"

triggers:
  - 投资想法
  - 投资问题
  - 记忆
  - 提醒
  - 持仓检查
  - 大师思想
  - 更新
  - 修改
  - 再次运行
  - 重新执行

skills:
  - name: idea-recorder
    triggers:
      - 想法记录
      - 投资想法
      - 我觉得
      - 想看看
      - 关注
      - 考虑买入
      - 准备卖出
    description: "投资想法记录Skill。解析用户输入，识别标的、价格、指标，关联历史决策和大师思想，生成结构化想法卡片。"

  - name: knowledge-rag
    triggers:
      - 什么是
      - 如何看待
      - 如何分析
      - 投资理论
      - 护城河
      - 安全边际
      - 周期理论
    description: "投资知识RAG Skill。基于大师思想库（巴菲特、芒格、段永平、霍华德·马克斯等）和投资理论，回答投资问题。"

  - name: memory-keeper
    triggers:
      - 我的持仓
      - 我之前
      - 关于
      - 的想法
      - 我的投资原则
      - 行为模式
    description: "用户记忆管理Skill。维护用户画像、历史投资决策、行为模式，支持语义检索和模式发现。"

  - name: reminder-scheduler
    triggers:
      - 提醒我
      - 跌破
      - 涨到
      - 当PE分位
      - 每周检查
      - 每月总结
      - 通知我
    description: "提醒调度Skill。管理价格提醒、时间提醒、条件提醒，支持条件触发和通知。"

  - name: master-analyst
    triggers:
      - 巴菲特怎么看
      - 芒格说
      - 段永平思想
      - 大师观点
      - 投资大师
    description: "大师思想分析Skill。提供巴菲特、芒格、段永平、霍华德·马克斯等投资大师的思想分析和对照。"

intents:
  - type: idea-recording
    triggers:
      - 提到股票/价格
      - "我觉得"
      - "想看看"
    route_to: idea-recorder

  - type: investment-qa
    triggers:
      - "什么是X"
      - "如何分析Y"
    route_to: knowledge-rag

  - type: memory-retrieval
    triggers:
      - "我之前"
      - "我的持仓"
    route_to: memory-keeper

  - type: reminder-setup
    triggers:
      - "提醒我"
      - "跌破"
      - "涨到"
    route_to: reminder-scheduler

  - type: master-thoughts
    triggers:
      - "巴菲特怎么看"
      - "段永平说"
    route_to: master-analyst

- type: learning-coaching
  triggers:
    - "怎么看.*趋势"
    - "为什么.*涨"
    - "为什么.*跌"
    - "为什么.*不一样"
    - "对.*什么影响"
  route_to: learning-coaching

data_storage:
  cards: data/cards/
  reminders: data/reminders/
  memory: data/memory/
  knowledge: data/knowledge/